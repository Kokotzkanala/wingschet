<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px;
            text-align: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .card {
            background: rgba(255,255,255,0.15);
            padding: 40px;
            border-radius: 15px;
            max-width: 600px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: white;
            color: #4f46e5;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 15px;
            background: rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<header>
    <h1>🌐 Test Website</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<main>
    <div class="card">
        <h2>Welcome!</h2>
        <p>
            This is a simple HTML test page with embedded CSS and JavaScript.
            Feel free to modify it for your own experiments.
        </p>

        <button onclick="showMessage()">Click Me</button>

        <p id="message" style="margin-top:20px;"></p>
    </div>
</main>

<footer>
    &copy; 2026 Test Website
</footer>

<script>
function showMessage() {
    const message = document.getElementById("message");
    message.textContent = "🎉 JavaScript is working!";
}
</script>

</body>
</html>
